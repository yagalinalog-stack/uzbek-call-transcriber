services:
  - type: web
    name: uzbek-call-transcriber
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: NODE_ENV
        value: production
      - key: MAX_UPLOAD_MB
        value: 200
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_MAX_OUTPUT_TOKENS
        value: 32768
      - key: GEMINI_FILE_PROCESSING_ATTEMPTS
        value: 150
      - key: GEMINI_API_KEY
        sync: false
